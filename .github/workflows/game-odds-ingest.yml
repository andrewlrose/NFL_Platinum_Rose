# GameOddsIngestAgent — captures spread/moneyline/total snapshots for upcoming NFL games
#
# Required repo secrets (Settings > Secrets > Actions):
#   ODDS_API_KEY              — TheOddsAPI key
#   SUPABASE_URL              — https://aambmuzfcojxqvbzhngp.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY — service_role JWT
#
# Rate budget:
#   1 request per run × 3 markets = 1 API call (h2h+spreads+totals in one call)
#   4×/day offseason ≈ 120 calls/month (minimal)
#   6×/day in-season ≈ 180 calls/month — stays well within free-tier limits
#
# Offseason behavior:
#   TheOddsAPI returns 404/422 when no NFL games are scheduled.
#   The agent handles this gracefully — logs and exits cleanly, no error.

name: Game Odds Ingest

on:
  schedule:
    # In-season: every 4 hours on Sunday (captures line movement through game day)
    - cron: '30 */4 * * 0'
    # In-season: every 4 hours on Thursday + Monday (other game days)
    - cron: '30 */4 * * 1'
    - cron: '30 */4 * * 4'
    # All other days: twice daily (8 AM + 8 PM UTC — offseason futures check)
    - cron: '30 8  * * 2,3,5,6'
    - cron: '30 20 * * 2,3,5,6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch + parse only, no Supabase writes)'
        required: false
        default: false
        type: boolean
      season:
        description: 'Season year override (default: current year)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  game-odds-ingest:
    name: Fetch game odds + write snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run GameOddsIngestAgent
        env:
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN:                   ${{ inputs.dry_run || 'false' }}
          GAME_ODDS_SEASON:          ${{ inputs.season || '' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.season }}" ]; then ARGS="$ARGS --season ${{ inputs.season }}"; fi
          node agents/game-odds-ingest.js $ARGS

      - name: Log completion
        if: success()
        run: echo "✅ Game odds snapshot captured at $(date -u)"
