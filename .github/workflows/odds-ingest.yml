# OddsIngestAgent - scheduled odds polling + line movement detection
#
# Required repo secrets (Settings > Secrets > Actions):
#   SUPABASE_URL              - https://aambmuzfcojxqvbzhngp.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY - service_role JWT
#   ODDS_API_KEY              - TheOddsAPI key (500 req/month free plan)
#
# Schedule: every 4 hours = ~180 runs/month (within free API budget)
# Manual trigger: Actions tab -> "Odds Ingest" -> Run workflow

name: Odds Ingest

on:
  schedule:
    # Every 4 hours — adjust during offseason to save API quota
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip API call, use mock data)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  ingest:
    name: Fetch odds + detect movements
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run OddsIngestAgent
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
          DRY_RUN:                   ${{ inputs.dry_run }}
        run: node agents/odds-ingest.js

      - name: Log completion
        if: success()
        run: echo "✅ Ingest complete at $(date -u)"
