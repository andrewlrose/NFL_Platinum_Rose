name: Pick Extraction Agent

on:
  # Auto-run after podcast-ingest completes successfully
  workflow_run:
    workflows: ['Podcast Ingest Agent']
    types: [completed]
  # Manual trigger for backfill / re-runs
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log picks without writing to Supabase)'
        required: false
        default: false
        type: boolean

jobs:
  pick-extraction:
    # Skip if triggered by a failed podcast-ingest run
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run PickExtractionAgent
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN:                   ${{ inputs.dry_run || 'false' }}
        run: node agents/pick-extraction.js
